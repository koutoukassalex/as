name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Generate placeholder assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def make_png(w, h, r, g, b, path):
              raw = b''
              for y in range(h):
                  raw += b'\x00' + bytes([r,g,b]) * w
              comp = zlib.compress(raw)
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              with open(path, 'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n')
                  f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)))
                  f.write(chunk(b'IDAT', comp))
                  f.write(chunk(b'IEND', b''))
          make_png(1024, 1024, 26, 26, 46, 'assets/icon.png')
          make_png(1284, 2778, 18, 18, 18, 'assets/splash.png')
          make_png(1024, 1024, 26, 26, 46, 'assets/adaptive-icon.png')
          make_png(48, 48, 26, 26, 46, 'assets/favicon.png')
          print('Assets generated!')
          "

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned Archive)
        run: |
          cd ios
          WORKSPACE=$(ls | grep \.xcworkspace$ | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Create an Archive (The most robust build method)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/App.xcarchive \
            ARCHS="arm64" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            ENABLE_BITCODE=NO \
            -quiet archive
          
          echo "ARCHIVE SUCCEEDED"

      - name: Package into .ipa
        run: |
          # Extract the .app from the archive
          APP_PATH=$(find ios/build/App.xcarchive -type d -name "*.app" | head -1)
          echo "Found app in archive at: $APP_PATH"
          
          # Force generate JS bundle to be sure
          echo "Generating JS bundle..."
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output "$APP_PATH/main.jsbundle" \
            --assets-dest "$APP_PATH"
          
          # Final Diagnostic
          echo "=== App Bundle Contents ==="
          ls -R "$APP_PATH" | head -50
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload
          echo "IPA created successfully!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: qwen-ios-app
          path: app.ipa
