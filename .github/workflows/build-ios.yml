name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate placeholder assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def make_png(w, h, r, g, b, path):
              raw = b''
              for y in range(h):
                  raw += b'\x00' + bytes([r,g,b]) * w
              comp = zlib.compress(raw)
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              with open(path, 'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n')
                  f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)))
                  f.write(chunk(b'IDAT', comp))
                  f.write(chunk(b'IEND', b''))
          make_png(1024, 1024, 26, 26, 46, 'assets/icon.png')
          make_png(1284, 2778, 18, 18, 18, 'assets/splash.png')
          make_png(1024, 1024, 26, 26, 46, 'assets/adaptive-icon.png')
          make_png(48, 48, 26, 26, 46, 'assets/favicon.png')
          print('Assets generated!')
          "

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Build App (Unsigned)
        run: |
          cd ios
          
          # Find the workspace dynamically since Expo generates it
          WORKSPACE=$(ls | grep \.xcworkspace$)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json | jq -r '.workspace.schemes[0]')
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Force Xcode to compile the code without Apple Developer Certificates
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into .ipa
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r *.app Payload/
          zip -r ../../../../../app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: qwen-ios-app
          path: app.ipa
