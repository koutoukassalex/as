name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate placeholder assets
        run: |
          mkdir -p assets
          brew install imagemagick
          convert -size 1024x1024 xc:'#1a1a2e' -fill '#4A90E2' -gravity center -pointsize 200 -annotate 0 'Q' assets/icon.png
          convert -size 1284x2778 xc:'#121212' -fill '#4A90E2' -gravity center -pointsize 120 -annotate 0 'Qwen2-VL' assets/splash.png
          cp assets/icon.png assets/adaptive-icon.png
          convert -size 48x48 xc:'#1a1a2e' assets/favicon.png

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Build App (Unsigned)
        run: |
          cd ios
          
          # Find the workspace dynamically since Expo generates it
          WORKSPACE=$(ls | grep \.xcworkspace$)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json | jq -r '.workspace.schemes[0]')
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Force Xcode to compile the code without Apple Developer Certificates
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into .ipa
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r *.app Payload/
          zip -r ../../../../../app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: qwen-ios-app
          path: app.ipa
